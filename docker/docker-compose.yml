version: '3.9'

services:
  # ─── Frontend (nginx serving static files) ──────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: nexus-ultra-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:     ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ─── Backend (Node.js API server) ───────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api-server
    container_name: nexus-ultra-backend
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV:          production
      PORT:              3000
      APP_BASE_URL:      ${APP_BASE_URL:-http://localhost}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - nexus-net
    healthcheck:
      test:     ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

  # ─── Redis (caching & rate limiting) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-ultra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - nexus-net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Firebase Emulator (development only) ───────────────────────────────────
  firebase-emulator:
    image: node:20-alpine
    container_name: nexus-ultra-emulator
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "npm install -g firebase-tools && firebase emulators:start --only auth,firestore,functions"
    ports:
      - "9099:9099"   # Auth
      - "8080:8080"   # Firestore
      - "5001:5001"   # Functions
      - "4000:4000"   # Emulator UI
    environment:
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-nexus-ultra-dev}
    networks:
      - nexus-net
    profiles:
      - development

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  nexus-net:
    driver: bridge
    name:   nexus-ultra-network

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
    name:   nexus-ultra-redis-data
