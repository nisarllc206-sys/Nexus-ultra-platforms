security:
  ssl: "Full (strict)"
  security_header:
    enabled: true
    max_age: 31536000
    include_subdomains: true

  brotli_compression: true
  minify:
    html: true
    css: true
    javascript: true

  rate_limiting:
    enabled: true
    threshold: 100
    period: 10 # seconds

caching:
  default_ttl: 1800
  browser_cache_ttl: 1800
  rules:
    - path: "/api/*"
      ttl: 0 # No cache for API responses
    - path: "/static/*"
      ttl: 86400 # 24 hours

performance:
  rocket_loader: true
  lazy_load_images: true
  auto_minify: true
