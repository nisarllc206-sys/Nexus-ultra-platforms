version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      API_KEY: "${API_KEY:-changeme}"
      STORE_ADAPTER: "${STORE_ADAPTER:-memory}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Supabase (uncomment and fill in to use):
      # SUPABASE_URL: "${SUPABASE_URL}"
      # SUPABASE_KEY: "${SUPABASE_KEY}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
